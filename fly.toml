# fly.toml app configuration file generated for imgbed on 2026-04-11T21:58:49+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'imgbed'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256

[processes]
  app = ".venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000"
  worker = ".venv/bin/arq app.worker.WorkerSettings"
