services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: imgbed
      POSTGRES_PASSWORD: imgbed
      POSTGRES_DB: imgbed
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://imgbed:imgbed@db:5432/imgbed
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - uploads:/app/uploads
  worker:
    build: .
    environment:
      DATABASE_URL: postgresql://imgbed:imgbed@db:5432/imgbed
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis
    command: .venv/bin/arq app.worker.WorkerSettings
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads: