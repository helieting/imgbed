services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: imgbed
      POSTGRES_PASSWORD: imgbed
      POSTGRES_DB: imgbed
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  minio:
    image: minio/minio
    command: server /data
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://imgbed:imgbed@db:5432/imgbed
      REDIS_URL: redis://redis:6379
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL_S3: http://minio:9000
      BUCKET_NAME: imgbed-uploads
    depends_on:
      - db
      - redis
      - minio
  worker:
    build: .
    environment:
      DATABASE_URL: postgresql://imgbed:imgbed@db:5432/imgbed
      REDIS_URL: redis://redis:6379
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL_S3: http://minio:9000
      BUCKET_NAME: imgbed-uploads
    depends_on:
      - db
      - redis
      - minio
    command: .venv/bin/arq app.worker.WorkerSettings

volumes:
  pgdata: